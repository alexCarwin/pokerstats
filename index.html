<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZALUBANK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.5); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-3 min-h-screen flex flex-col pb-24 relative">

    <div id="saving-overlay" class="fixed top-14 left-0 right-0 z-[999] hidden flex justify-center pointer-events-none transition-opacity duration-300">
        <div class="bg-zinc-900/95 border border-zinc-700 px-4 py-2 rounded-full flex items-center shadow-[0_0_20px_rgba(0,0,0,0.6)] backdrop-blur-md">
            <div class="w-4 h-4 border-2 border-zinc-600 border-t-emerald-500 rounded-full animate-spin mr-2"></div>
            <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Синхронизация...</span>
        </div>
    </div>

    <div id="note-modal" class="fixed inset-0 hidden z-[100] p-4 flex items-center justify-center bg-black/90 backdrop-blur-sm transition-opacity">
        <div class="bg-zinc-900 border border-zinc-700 p-4 rounded-2xl w-full max-w-sm flex flex-col shadow-2xl">
            <h3 class="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-3">📝 Редактировать заметку</h3>
            <textarea id="note-textarea" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm text-white outline-none focus:border-purple-500 resize-none mb-4 placeholder-zinc-600 shadow-inner" placeholder="Например: Вася перевел Пете 500р..."></textarea>
            <div class="flex space-x-3">
                <button onclick="closeNoteModal()" class="flex-1 py-2.5 bg-zinc-800 text-zinc-400 text-xs font-bold uppercase tracking-widest rounded-xl hover:bg-zinc-700 transition">Отмена</button>
                <button onclick="saveNoteModal()" class="flex-1 py-2.5 bg-purple-600 text-white text-xs font-bold uppercase tracking-widest rounded-xl hover:bg-purple-500 transition shadow-[0_0_15px_rgba(147,51,234,0.3)]">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto w-full flex justify-between items-center mb-4 pt-1">
        <div class="flex items-center space-x-2">
            <h1 onclick="secretLogin()" class="text-xl font-black uppercase italic tracking-tighter drop-shadow-lg cursor-pointer">
                <span class="text-white">ZALU</span><span class="text-emerald-500">BANK</span>
            </h1>
            <div id="network-status" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)] transition-colors duration-300" title="Подключение..."></div>
        </div>
        <button id="btn-end-game" onclick="endGame()" class="hidden text-[10px] font-bold text-red-400 uppercase tracking-widest bg-red-900/20 px-3 py-2 rounded-lg border border-red-900/50 hover:bg-red-900/40 active:scale-95 transition">Завершить игру</button>
    </div>

    <div class="max-w-md mx-auto w-full flex-1 flex flex-col">
        
        <div class="glass-panel rounded-2xl p-4 mb-4 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-3 relative z-10">
                <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Касса</span>
                <span id="status-badge" class="text-[9px] font-bold px-2 py-1 rounded-md bg-zinc-800 text-zinc-400 uppercase tracking-wider transition-colors">Синхронизация...</span>
            </div>
            
            <div class="flex space-x-4 relative z-10">
                <div class="flex-1">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider mb-0.5">Всего бай-инов</p>
                    <p id="total-buyins" class="text-xl font-black text-white">0 ₽</p>
                </div>
                <div class="flex-1">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider mb-0.5">Фишек на руках</p>
                    <p id="total-cashouts" class="text-xl font-black text-zinc-400">0 ₽</p>
                </div>
            </div>
            <div id="status-bg" class="absolute inset-0 opacity-10 transition-colors duration-500"></div>
        </div>

        <div class="flex space-x-2 mb-5">
            <button onclick="openHistory()" class="flex-1 py-2.5 bg-blue-900/20 text-blue-400 text-[9px] font-black uppercase tracking-widest rounded-xl border border-blue-900/50 hover:bg-blue-900/40 transition shadow-lg active:scale-95 flex items-center justify-center">
                🏆 Стата
            </button>
            <button onclick="openSessions()" class="flex-1 py-2.5 bg-purple-900/20 text-purple-400 text-[9px] font-black uppercase tracking-widest rounded-xl border border-purple-900/50 hover:bg-purple-900/40 transition shadow-lg active:scale-95 flex items-center justify-center">
                📖 История
            </button>
        </div>

        <div id="add-player-section" class="flex space-x-2 mb-4 hidden relative">
            <div class="flex-1 relative">
                <input type="text" id="new-player-name" placeholder="Имя игрока" autocomplete="off" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-sm font-bold text-white outline-none focus:border-emerald-500 transition placeholder-zinc-700" oninput="handlePlayerSearch()" onkeyup="if(event.key === 'Enter') addPlayer()">
                <div id="autocomplete-dropdown" class="hidden absolute left-0 right-0 top-full mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-xl z-50 max-h-48 overflow-y-auto scrollbar-hide"></div>
            </div>
            <button onclick="addPlayer()" class="bg-emerald-600 text-white font-black text-xs uppercase tracking-wider px-4 rounded-lg hover:bg-emerald-500 active:scale-95 transition shadow-lg shadow-emerald-900/50">В игру</button>
        </div>

        <div class="mb-6">
            <div id="players-list" class="space-y-2">
                <p class="text-xs text-zinc-600 font-medium text-center py-4 italic">Загрузка данных...</p>
            </div>
        </div>

        <button onclick="calculateDebts()" class="w-full py-3 bg-zinc-100 text-zinc-900 text-[10px] font-black uppercase tracking-[0.2em] rounded-xl hover:bg-white transition shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95 mb-4">Рассчитать долги</button>

        <div id="results-panel" class="hidden glass-panel rounded-2xl p-4 border-emerald-900/50 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-blue-500"></div>
            <h2 class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-3">Кому куда переводить</h2>
            <div id="transactions-list" class="space-y-2">
            </div>
        </div>

    </div>

    <div id="history-modal" class="fixed inset-0 hidden z-50 p-3 flex flex-col bg-black/95 backdrop-blur-md overflow-y-auto">
        <div class="max-w-md mx-auto w-full flex-1 flex flex-col pb-6">
            <div class="flex justify-between items-center mb-4 mt-2">
                
                <div class="flex items-center space-x-2">
                    <h2 class="text-sm font-black text-blue-500 uppercase tracking-widest">Зал Славы</h2>
                    <select id="history-filter" onchange="openHistory()" class="bg-zinc-800 text-blue-400 text-[10px] font-bold uppercase tracking-wider rounded border border-blue-900/50 outline-none px-1.5 py-1">
                        <option value="all">За всё время</option>
                    </select>
                </div>
                
                <div class="flex items-center space-x-2 cursor-pointer" onclick="toggleProfits()">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Показать</span>
                    <div id="profit-toggle-bg" class="w-8 h-4 rounded-full bg-zinc-800 relative transition-colors duration-300">
                        <div id="profit-toggle-dot" class="w-3 h-3 rounded-full bg-zinc-400 absolute top-0.5 left-0.5 transition-transform duration-300"></div>
                    </div>
                </div>

                <button onclick="closeHistory()" class="text-zinc-400 text-xs font-bold uppercase hover:text-white transition ml-2">✕</button>
            </div>
            
            <div class="glass-panel rounded-xl p-1 shadow-2xl border-blue-900/30">
                <div class="flex px-3 py-2 text-[8px] font-bold text-zinc-500 uppercase tracking-widest border-b border-zinc-800/50">
                    <div class="w-[45%] flex items-center pr-1">
                        <span class="w-4 inline-block text-right">#</span>
                        <span class="ml-2">Игрок (Профиль)</span>
                    </div>
                    <div class="w-[15%] text-center">Игр</div>
                    <div class="w-[25%] text-right">Профит</div>
                    <div id="history-admin-header" class="w-[15%] text-right hidden"></div>
                </div>
                <div id="history-list" class="flex flex-col">
                </div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 hidden z-50 p-3 flex flex-col bg-black/95 backdrop-blur-md overflow-y-auto">
        <div class="max-w-md mx-auto w-full flex-1 flex flex-col pb-6">
            <div class="flex justify-between items-start mb-6 mt-4">
                <div>
                    <h2 id="profile-name" class="text-3xl font-black text-white uppercase tracking-tighter drop-shadow-md">Имя</h2>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Досье игрока</p>
                </div>
                <button onclick="closePlayerProfile()" class="text-zinc-400 text-xs font-bold uppercase hover:text-white transition bg-zinc-900 p-2 rounded-lg border border-zinc-800">Назад ✕</button>
            </div>
            
            <div class="flex space-x-3 mb-6">
                <div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl p-4 flex flex-col justify-center items-center shadow-lg">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mb-1">Сыграно</span>
                    <span id="profile-games" class="text-2xl font-black text-white">0</span>
                </div>
                <div class="flex-[1.5] bg-zinc-900 border border-zinc-800 rounded-2xl p-4 flex flex-col justify-center items-center shadow-lg relative overflow-hidden">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mb-1 relative z-10">Общий профит</span>
                    <span id="profile-net" class="text-2xl font-black relative z-10">0 ₽</span>
                </div>
            </div>

            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3 px-1">История сессий</h3>
            <div id="profile-sessions-list" class="space-y-2">
            </div>
        </div>
    </div>

    <div id="sessions-modal" class="fixed inset-0 hidden z-50 p-3 flex flex-col bg-black/95 backdrop-blur-md overflow-y-auto">
        <div class="max-w-md mx-auto w-full flex-1 flex flex-col pb-6">
            <div class="flex justify-between items-center mb-4 mt-2">
                <h2 class="text-sm font-black text-purple-500 uppercase tracking-widest">История игр</h2>
                <button onclick="closeSessions()" class="text-zinc-400 text-xs font-bold uppercase hover:text-white transition">Закрыть ✕</button>
            </div>
            <div id="sessions-list" class="flex flex-col space-y-3">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1wjcRJdVy8gOoUUEb2ACgSpFbYmeAkCk",
            authDomain: "pokerstats-5fc3e.firebaseapp.com",
            databaseURL: "https://pokerstats-5fc3e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pokerstats-5fc3e",
            storageBucket: "pokerstats-5fc3e.firebasestorage.app",
            messagingSenderId: "274914765946",
            appId: "1:274914765946:web:edcc8e3e96c9cb6c905fc3"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRef = ref(database, 'zalubank_data');
        const connectedRef = ref(database, '.info/connected');

        let db = { game: [], history: {}, sessions: {} };
        let isFirstLoad = true;
        
        const SECRET_PIN = "888"; 
        let isAdmin = localStorage.getItem('zalubank_admin') === 'true';
        let isProfitsVisible = false; 

        let isOnline = false;
        let pendingSaves = 0;
        let currentNoteSessionId = null;

        const monthNames = {
            '01': 'Янв', '02': 'Фев', '03': 'Мар', '04': 'Апр', 
            '05': 'Май', '06': 'Июн', '07': 'Июл', '08': 'Авг', 
            '09': 'Сен', '10': 'Окт', '11': 'Ноя', '12': 'Дек'
        };

        onValue(connectedRef, (snap) => {
            isOnline = snap.val() === true;
            updateNetworkUI();
        });

        function updateNetworkUI() {
            const indicator = document.getElementById('network-status');
            if (!indicator) return;
            
            if (!isOnline) {
                indicator.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]";
                indicator.title = "Нет сети (Оффлайн)";
            } else if (pendingSaves > 0) {
                indicator.className = "w-2 h-2 rounded-full bg-yellow-400 animate-pulse shadow-[0_0_8px_rgba(250,204,21,0.8)]";
                indicator.title = "Сохранение...";
            } else {
                indicator.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)] transition-colors duration-300";
                indicator.title = "Синхронизировано";
            }
        }

        window.addEventListener('beforeunload', (e) => {
            if (pendingSaves > 0 || !isOnline) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && document.activeElement && document.activeElement.tagName === 'INPUT') {
                document.activeElement.blur(); 
            }
        });

        document.addEventListener('click', function(e) {
            const input = document.getElementById('new-player-name');
            const dropdown = document.getElementById('autocomplete-dropdown');
            if (input && dropdown && e.target !== input && e.target !== dropdown) {
                dropdown.classList.add('hidden');
            }
        });

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                db = data;
                if (!db.game) db.game = [];
                if (!db.history) db.history = {};
                if (!db.sessions) db.sessions = {};
            } else {
                db = { game: [], history: {}, sessions: {} };
            }
            
            render();
            if(!document.getElementById('history-modal').classList.contains('hidden')) window.openHistory();
            if(!document.getElementById('sessions-modal').classList.contains('hidden')) window.openSessions();
            if(!document.getElementById('profile-modal').classList.contains('hidden')) {
                const currentPlayer = document.getElementById('profile-name').innerText;
                window.openPlayerProfile(currentPlayer);
            }
            isFirstLoad = false;
        });

        function saveToCloud() {
            pendingSaves++;
            updateNetworkUI();
            
            const loader = document.getElementById('saving-overlay');
            loader.classList.remove('hidden');
            
            return set(dbRef, db).then(() => {
                pendingSaves--;
                updateNetworkUI();
                if(pendingSaves === 0) loader.classList.add('hidden');
            }).catch(e => {
                pendingSaves--;
                updateNetworkUI();
                if(pendingSaves === 0) loader.classList.add('hidden');
                console.error("Ошибка сохранения:", e);
                alert("Ошибка соединения! Проверьте интернет.");
            });
        }

        window.secretLogin = function() {
            if(isAdmin) {
                if(confirm("Выйти из режима Администратора? Поля редактирования закроются.")) {
                    isAdmin = false;
                    localStorage.removeItem('zalubank_admin');
                    render();
                    if(!document.getElementById('history-modal').classList.contains('hidden')) window.openHistory();
                    if(!document.getElementById('sessions-modal').classList.contains('hidden')) window.openSessions();
                }
            } else {
                let pin = prompt("Введите PIN-код для доступа к управлению игрой:");
                if(pin === SECRET_PIN) {
                    isAdmin = true;
                    localStorage.setItem('zalubank_admin', 'true');
                    alert("Режим Администратора разблокирован! 🔓");
                    render();
                    if(!document.getElementById('history-modal').classList.contains('hidden')) window.openHistory();
                    if(!document.getElementById('sessions-modal').classList.contains('hidden')) window.openSessions();
                } else if (pin !== null) {
                    alert("Неверный PIN-код ❌");
                }
            }
        }

        window.toggleProfits = function() {
            isProfitsVisible = !isProfitsVisible;
            
            const bg = document.getElementById('profit-toggle-bg');
            const dot = document.getElementById('profit-toggle-dot');
            if (isProfitsVisible) {
                bg.classList.remove('bg-zinc-800');
                bg.classList.add('bg-blue-600');
                dot.classList.remove('translate-x-0', 'bg-zinc-400');
                dot.classList.add('translate-x-4', 'bg-white');
            } else {
                bg.classList.remove('bg-blue-600');
                bg.classList.add('bg-zinc-800');
                dot.classList.remove('translate-x-4', 'bg-white');
                dot.classList.add('translate-x-0', 'bg-zinc-400');
            }

            if(!document.getElementById('history-modal').classList.contains('hidden')) window.openHistory();
            if(!document.getElementById('profile-modal').classList.contains('hidden')) {
                window.openPlayerProfile(document.getElementById('profile-name').innerText);
            }
        }

        window.handlePlayerSearch = function() {
            const inputVal = document.getElementById('new-player-name').value.trim().toLowerCase();
            const dropdown = document.getElementById('autocomplete-dropdown');
            dropdown.innerHTML = '';

            if (!inputVal || !db.history) {
                dropdown.classList.add('hidden');
                return;
            }

            const currentPlayers = db.game ? db.game.map(p => p.name.toLowerCase()) : [];
            
            const matches = Object.keys(db.history).filter(name => 
                name.toLowerCase().includes(inputVal) && !currentPlayers.includes(name.toLowerCase())
            );

            if (matches.length > 0) {
                matches.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'px-3 py-2.5 text-sm font-bold text-white hover:bg-zinc-700 cursor-pointer border-b border-zinc-700 last:border-0 transition-colors';
                    div.innerText = name;
                    div.onclick = function() {
                        document.getElementById('new-player-name').value = name;
                        dropdown.classList.add('hidden');
                        window.addPlayer();
                    };
                    dropdown.appendChild(div);
                });
                dropdown.classList.remove('hidden');
            } else {
                dropdown.classList.add('hidden');
            }
        }

        function render() {
            const hasPlayers = db.game && db.game.length > 0;
            document.getElementById('btn-end-game').classList.toggle('hidden', !isAdmin || !hasPlayers);
            document.getElementById('add-player-section').classList.toggle('hidden', !isAdmin);

            let activeId = document.activeElement ? document.activeElement.id : null;
            let activeVal = null;
            if (activeId && (activeId.startsWith('buyin-') || activeId.startsWith('cashout-'))) {
                activeVal = document.activeElement.value;
            }

            const list = document.getElementById('players-list');
            let newHTML = '';
            
            let totalBuyIns = 0;
            let totalCashouts = 0;

            if (!db.game || db.game.length === 0) {
                if(isFirstLoad) {
                    newHTML = '<p class="text-xs text-zinc-600 font-medium text-center py-4 italic">Подключение...</p>';
                } else {
                    newHTML = '<p class="text-xs text-zinc-600 font-medium text-center py-4 italic">Стол пуст. Зови фишей.</p>';
                }
            }

            if(db.game) {
                db.game.forEach((p, index) => {
                    const bIn = p.buyIn === null || p.buyIn === undefined ? 0 : p.buyIn;
                    const cOut = p.cashOut === null || p.cashOut === undefined ? 0 : p.cashOut;
                    
                    totalBuyIns += bIn;
                    totalCashouts += cOut;

                    const net = cOut - bIn;
                    const netClass = net > 0 ? 'text-emerald-500' : (net < 0 ? 'text-red-500' : 'text-zinc-500');
                    const netText = net > 0 ? `+${net}` : net;

                    const buyInDisplay = p.buyIn === null || p.buyIn === undefined ? '' : p.buyIn;
                    const cashOutDisplay = p.cashOut === null || p.cashOut === undefined ? '' : p.cashOut;

                    let deleteBtnHTML = isAdmin ? `<button onclick="removePlayer(${index})" class="absolute top-2 right-2 w-5 h-5 bg-red-900/50 text-red-400 rounded-full text-[10px] font-bold flex items-center justify-center hover:bg-red-600 hover:text-white transition">✕</button>` : '';

                    let buyInHtml = isAdmin ? `
                        <div class="flex">
                            <input id="buyin-${index}" type="number" value="${buyInDisplay}" placeholder="0" onchange="updateBuyIn(${index}, this.value)" onkeyup="if(event.key === 'Enter') this.blur()" class="w-full bg-zinc-800 rounded-l-md px-2 py-1 text-xs font-bold text-white outline-none border border-transparent focus:border-zinc-500 transition">
                            <button onclick="addRebuy(${index}, 1000)" class="bg-zinc-700 text-[10px] font-bold text-white px-2 rounded-r-md border-l border-zinc-800 hover:bg-zinc-600 transition active:bg-zinc-500">+1000</button>
                        </div>
                    ` : `
                        <div class="flex h-[26px] items-center px-2 bg-zinc-800/50 rounded-md border border-zinc-800">
                            <span class="text-xs font-bold text-white">${buyInDisplay || '0'}</span>
                        </div>
                    `;

                    let cashOutHtml = isAdmin ? `
                        <input id="cashout-${index}" type="number" value="${cashOutDisplay}" placeholder="0" onchange="updateCashOut(${index}, this.value)" onkeyup="if(event.key === 'Enter') this.blur()" class="w-full bg-zinc-800 rounded-md px-2 py-1 text-xs font-bold text-white outline-none border border-transparent focus:border-blue-500 transition">
                    ` : `
                        <div class="flex h-[26px] items-center px-2 bg-zinc-800/50 rounded-md border border-zinc-800">
                            <span class="text-xs font-bold text-white">${cashOutDisplay || '0'}</span>
                        </div>
                    `;

                    newHTML += `
                        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-2.5 flex flex-col relative">
                            <div class="flex justify-between items-center mb-1.5 pr-4">
                                <span class="font-black text-white text-sm tracking-tight">${p.name}</span>
                                <span class="text-[9px] font-bold ${netClass}">Итог: ${netText}</span>
                            </div>
                            
                            <div class="flex space-x-2 items-end">
                                <div class="flex-[1.2]">
                                    <span class="text-[7px] font-bold text-zinc-500 uppercase tracking-widest ml-1 block mb-0.5">Бай-ин</span>
                                    ${buyInHtml}
                                </div>
                                <div class="flex-1">
                                    <span class="text-[7px] font-bold text-zinc-500 uppercase tracking-widest ml-1 block mb-0.5">Стэк</span>
                                    ${cashOutHtml}
                                </div>
                            </div>

        window.addPlayer = function() {
            if(!isAdmin) return;
            const nameInput = document.getElementById('new-player-name');
            let rawName = nameInput.value.trim();
            if (!rawName) return;

            let existingName = null;
            if (db.history) {
                existingName = Object.keys(db.history).find(k => k.toLowerCase() === rawName.toLowerCase());
            }

            let name = existingName ? existingName : rawName.charAt(0).toUpperCase() + rawName.slice(1).toLowerCase();

            if (db.sessions) {
                let hasDebt = false;
                Object.keys(db.sessions).forEach(sessionId => {
                    const session = db.sessions[sessionId];
                    const pData = session.players.find(p => p.name === name);
                    if (pData) {
                        const net = (pData.cashOut || 0) - (pData.buyIn || 0);
                        const isSettled = pData.settled !== undefined ? pData.settled : (net === 0);
                        if (net < 0 && !isSettled) {
                            hasDebt = true;
                        }
                    }
                });

                if (hasDebt) {
                    alert(`❌ НЕЛЬЗЯ ДОБАВИТЬ ИГРОКА!\n\nУ игрока "${name}" есть нерассчитанный минус в прошлых играх. Пусть сначала вернет долги!`);
                    nameInput.value = '';
                    document.getElementById('autocomplete-dropdown').classList.add('hidden');
                    nameInput.blur();
                    return; 
                }
            }

            if (!db.game) db.game = [];
            if (db.game.some(p => p.name === name)) return alert("Этот игрок уже за столом!");

            db.game.push({ name: name, buyIn: null, cashOut: null });
            if (!db.history[name]) db.history[name] = { net: 0, games: 0 };
            
            nameInput.value = '';
            document.getElementById('autocomplete-dropdown').classList.add('hidden');
            nameInput.blur();
            document.getElementById('results-panel').classList.add('hidden');
            saveToCloud();
        }

        window.endGame = function() {
            if(!isAdmin) return alert("Сорри, только админ может завершать игру!");
            if (db.game.length === 0) return alert('Стол пуст!');
            
            let totalB = db.game.reduce((sum, p) => sum + (p.buyIn || 0), 0);
            let totalC = db.game.reduce((sum, p) => sum + (p.cashOut || 0), 0);

            if (totalB !== totalC) {
                if(!confirm(`ВНИМАНИЕ: Касса не сходится! Разница: ${Math.abs(totalB - totalC)} руб.\n\nВсё равно завершить игру и записать эти результаты?`)) {
                    return;
                }
            } else {
                if(!confirm('Завершить игру? Результаты будут записаны в историю.')) return;
            }

            const sessionId = "sess_" + Date.now();
            const dateStr = new Date().toLocaleString('ru-RU', {day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute:'2-digit'});
            
            let finalPlayers = JSON.parse(JSON.stringify(db.game)).map(p => {
                let net = (p.cashOut || 0) - (p.buyIn || 0);
                if (net === 0) p.settled = true;
                return p;
            });

            if(!db.sessions) db.sessions = {};
            db.sessions[sessionId] = {
                date: dateStr,
                players: finalPlayers, 
                totalB: totalB,
                totalC: totalC
            };

            db.game.forEach(p => {
                const net = (p.cashOut || 0) - (p.buyIn || 0);
                if (!db.history[p.name]) db.history[p.name] = { net: 0, games: 0 };
                db.history[p.name].net += net;
                db.history[p.name].games += 1;
            });

            db.game = [];
            document.getElementById('results-panel').classList.add('hidden');
            saveToCloud();
            alert("Игра завершена и записана в историю!");
        }

        // --- ЛОГИКА ИЗВЛЕЧЕНИЯ МЕСЯЦЕВ ---
        function getMonthKey(dateStr) {
            const parts = dateStr.split(',')[0].split('.');
            if (parts.length >= 3) {
                return parts[1] + '.' + parts[2]; // MM.YY
            }
            return null;
        }

            let monthsSet = new Set();
            if (db.sessions) {
                Object.values(db.sessions).forEach(s => {
                    const k = getMonthKey(s.date);
                    if (k) monthsSet.add(k);
                });
            }
            
            let monthsArr = Array.from(monthsSet).sort((a, b) => {
                let [m1, y1] = a.split('.');
                let [m2, y2] = b.split('.');
                if (y1 !== y2) return parseInt(y2) - parseInt(y1);
                return parseInt(m2) - parseInt(m1);
            });

            let currentFilter = filterSelect.value;
            if (!filterSelect.hasAttribute('data-initialized')) {
                currentFilter = monthsArr.length > 0 ? monthsArr[0] : 'all';
                filterSelect.setAttribute('data-initialized', 'true');
            }

            let optionsHtml = '<option value="all">За всё время</option>';
            monthsArr.forEach(m => {

            filterSelect.innerHTML = optionsHtml;

            document.getElementById('history-admin-header').classList.toggle('hidden', !isAdmin || currentFilter !== 'all');

        window.editSessionPlayer = function(id, playerName) {
            if(!isAdmin) return;
            const session = db.sessions[id];
            if(!session) return;

            const playerIndex = session.players.findIndex(p => p.name === playerName);
            if(playerIndex === -1) return;

            const p = session.players[playerIndex];
            let oldB = p.buyIn || 0;
            let oldC = p.cashOut || 0;
            let oldNet = oldC - oldB;

            let newBStr = prompt(`Игрок: ${playerName}\n\nВведите правильный БАЙ-ИН (докупки) в этой игре:`, oldB);
            if(newBStr === null) return;
            let newCStr = prompt(`Игрок: ${playerName}\n\nВведите правильный СТЭК (на руках) в этой игре:`, oldC);
            if(newCStr === null) return;

            let newB = parseInt(newBStr) || 0;
            let newC = parseInt(newCStr) || 0;
            let newNet = newC - newB;

            session.players[playerIndex].buyIn = newB;
            session.players[playerIndex].cashOut = newC;
            session.players[playerIndex].settled = (newNet === 0);

            let tb = 0; let tc = 0;
            session.players.forEach(pl => {
                tb += (pl.buyIn || 0);
                tc += (pl.cashOut || 0);
            });
            session.totalB = tb;
            session.totalC = tc;

            if(db.history[playerName]) {
                db.history[playerName].net = db.history[playerName].net - oldNet + newNet;
            }

            saveToCloud();
            
            if (tb !== tc) {
                alert(`ВНИМАНИЕ! После вашего исправления банк в этой игре перестал сходиться:\nСумма бай-инов: ${tb}\nФишек на руках: ${tc}\n\nНе забудьте нажать ✏️ у второго игрока и тоже исправить его цифры, чтобы касса сошлась!`);
            }
        }

                if(playerIndex !== -1) {

        window.deleteSession = function(id) {
            if(!isAdmin) return;
            if(!confirm('Точно удалить эту сессию? ВНИМАНИЕ: Её результаты будут автоматически вычтены из Зала Славы у всех игроков!')) return;
            
            const session = db.sessions[id];
            if(session) {
                session.players.forEach(p => {
                    const net = (p.cashOut || 0) - (p.buyIn || 0);
                    if(db.history[p.name]) {
                        db.history[p.name].net -= net;
                        db.history[p.name].games -= 1;
                        if(db.history[p.name].games < 0) db.history[p.name].games = 0;
                    }
                });
                delete db.sessions[id];
                saveToCloud();
            }
        }

        window.calculateDebts = function() {
            if (db.game.length === 0) return alert('Добавьте игроков!');
            
            let totalB = db.game.reduce((sum, p) => sum + (p.buyIn || 0), 0);
            let totalC = db.game.reduce((sum, p) => sum + (p.cashOut || 0), 0);

            if (totalB === 0) return alert('Никто не делал бай-ины!');
            if (totalB !== totalC) {
                alert(`ВНИМАНИЕ: Дебет с кредитом не сходится!\nСумма бай-инов: ${totalB}\nФишек на руках: ${totalC}\n\nНайдите ошибку перед расчетом.`);
                return;
            }

            let debtors = []; 
            let creditors = []; 

            db.game.forEach(p => {
                let net = (p.cashOut || 0) - (p.buyIn || 0);
                if (net < 0) debtors.push({ name: p.name, amount: Math.abs(net) });
                else if (net > 0) creditors.push({ name: p.name, amount: net });
            });

            debtors.sort((a, b) => b.amount - a.amount);
            creditors.sort((a, b) => b.amount - a.amount);

            let transactions = [];
            let i = 0; let j = 0; 

            while (i < debtors.length && j < creditors.length) {
                let debtor = debtors[i];
                let creditor = creditors[j];

                let amountToTransfer = Math.min(debtor.amount, creditor.amount);

                transactions.push({ from: debtor.name, to: creditor.name, amount: amountToTransfer });

                debtor.amount -= amountToTransfer;
                creditor.amount -= amountToTransfer;

                if (debtor.amount === 0) i++;
                if (creditor.amount === 0) j++;
            }

            const panel = document.getElementById('results-panel');
            const list = document.getElementById('transactions-list');
            list.innerHTML = '';

            if (transactions.length === 0) {
                list.innerHTML = '<p class="text-xs text-zinc-400">Все остались при своих!</p>';
            } else {
                let html = '';
                transactions.forEach(t => {
                    html += `
                        <div class="flex items-center justify-between bg-zinc-900/80 p-3 rounded-xl border border-zinc-800">
                            <span class="text-xs font-bold text-red-400 w-1/3 truncate">${t.from}</span>
                            <div class="flex-1 flex flex-col items-center px-1">
                                <span class="text-[10px] font-black text-white bg-zinc-800 px-3 py-1 rounded-full border border-zinc-700 shadow-md">${t.amount} ₽</span>
                                <span class="text-[7px] text-zinc-500 mt-1 uppercase tracking-widest">переводит ➔</span>
                            </div>
                            <span class="text-xs font-bold text-emerald-400 w-1/3 text-right truncate">${t.to}</span>
                        </div>
                    `;
                });
                list.innerHTML = html;
            }

            panel.classList.remove('hidden');
            panel.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
    </script>
</body>
</html>
